name: Deploy LELE PFM Web

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet le déclenchement manuel depuis GitHub

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── Checkout ───
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Node.js + Cache ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lele-pfm/package-lock.json

      # ─── Install dependencies ───
      - name: Install dependencies
        working-directory: lele-pfm
        run: npm ci --legacy-peer-deps

      # ─── Create .env for build ───
      - name: Create .env
        working-directory: lele-pfm
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      # ─── Build Expo Web ───
      - name: Build Expo Web
        working-directory: lele-pfm
        run: npx expo export --platform web

      # ─── Verify build output ───
      - name: Verify build
        working-directory: lele-pfm
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ Build failed: dist/index.html not found"
            exit 1
          fi
          echo "✅ Build OK — $(find dist -type f | wc -l) files"

      # ─── Setup SSH ───
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── Deploy via rsync over SSH ───
      - name: Deploy to VPS
        run: |
          rsync -rlgoDzvc --delete \
            -e "ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            lele-pfm/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/pfm/

      # ─── Post-deploy commands ───
      - name: Post-deploy
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chown -R www-data:www-data /var/www/pfm && chmod -R 755 /var/www/pfm && systemctl reload nginx && echo 'Deployed at $(date)'"

      # ─── Health check ───
      - name: Health check
        run: |
          sleep 5
          DOMAIN="${{ secrets.DEPLOY_DOMAIN }}"
          DOMAIN="${DOMAIN:-pfm.hcmtechhub.cloud}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Site is live — HTTP $STATUS"
          else
            echo "⚠️ Site returned HTTP $STATUS — check Nginx"
          fi
