# ============================================================================
# Backend CI/CD Pipeline - Auto-deploy migrations and security checks
# ============================================================================
# Created: 2025-11-16
# Author: elite-saas-developer
# Purpose: Automate backend deployments with security gates
# ============================================================================

name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'src/integrations/supabase/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

  # Manual trigger
  workflow_dispatch:

env:
  SUPABASE_PROJECT_ID: yhidlozgpvzsroetjxqb
  SUPABASE_URL: https://yhidlozgpvzsroetjxqb.supabase.co

jobs:
  # ============================================================================
  # JOB 1: Security Scanning
  # ============================================================================
  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './supabase'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fail on critical/high
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Detect secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'HCM-PORTAL-V2'
          path: '.'
          format: 'HTML'

  # ============================================================================
  # JOB 2: Validate Migrations
  # ============================================================================
  validate-migrations:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase instance
        run: |
          supabase init --force
          supabase start

      - name: Run migrations on test DB
        run: |
          supabase db reset --db-url postgresql://postgres:postgres@localhost:54322/postgres

          # Apply migrations in order
          for migration in supabase/migrations/*.sql; do
            echo "Applying migration: $migration"
            psql postgresql://postgres:postgres@localhost:54322/postgres < "$migration"
          done

      - name: Verify migrations success
        run: |
          # Verify app_role enum has 6 values
          ROLE_COUNT=$(psql postgresql://postgres:postgres@localhost:54322/postgres \
            -t -c "SELECT COUNT(*) FROM unnest(enum_range(NULL::app_role))")

          if [ "$ROLE_COUNT" -ne 6 ]; then
            echo "ERROR: app_role enum should have 6 values, got $ROLE_COUNT"
            exit 1
          fi

          # Verify RLS is enabled
          RLS_ENABLED=$(psql postgresql://postgres:postgres@localhost:54322/postgres \
            -t -c "SELECT COUNT(*) FROM pg_tables WHERE schemaname = 'public' AND rowsecurity = true")

          if [ "$RLS_ENABLED" -lt 3 ]; then
            echo "ERROR: RLS should be enabled on at least 3 tables"
            exit 1
          fi

          echo "✅ All migration validations passed"

      - name: Run RLS policy tests
        run: |
          psql postgresql://postgres:postgres@localhost:54322/postgres < tests/rls-policies.test.sql

      - name: Stop Supabase
        run: supabase stop

  # ============================================================================
  # JOB 3: TypeScript Type Check
  # ============================================================================
  type-check:
    name: TypeScript Type Validation
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

  # ============================================================================
  # JOB 4: Deploy to Production (Main branch only)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [security-scan, validate-migrations, type-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://yhidlozgpvzsroetjxqb.supabase.co

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to production
        run: |
          supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          # Deploy all functions
          supabase functions deploy analyze-performance --project-ref ${{ env.SUPABASE_PROJECT_ID }}
          supabase functions deploy analyze-satisfaction --project-ref ${{ env.SUPABASE_PROJECT_ID }}
          supabase functions deploy calculate-savings --project-ref ${{ env.SUPABASE_PROJECT_ID }}
          supabase functions deploy generate-performance-cards --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run smoke tests
        run: |
          # Test API health
          curl -f ${{ env.SUPABASE_URL }}/rest/v1/ || exit 1

          # Test Edge Functions (require auth, just check 401)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.SUPABASE_URL }}/functions/v1/analyze-performance)
          if [ "$STATUS" != "401" ] && [ "$STATUS" != "200" ]; then
            echo "ERROR: Edge function returned unexpected status $STATUS"
            exit 1
          fi

          echo "✅ Smoke tests passed"

      - name: Verify RLS in production
        run: |
          # Check RLS is enabled on critical tables
          # Note: This requires a service role key with read access
          curl -X POST "${{ env.SUPABASE_URL }}/rest/v1/rpc/verify_rls_enabled" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            || echo "⚠️ Warning: Could not verify RLS (function may not exist yet)"

  # ============================================================================
  # JOB 5: Post-Deployment Monitoring
  # ============================================================================
  post-deploy-monitoring:
    name: Setup Post-Deploy Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send deployment notification to Sentry
        run: |
          curl -X POST https://sentry.io/api/0/organizations/YOUR_ORG/releases/ \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ github.sha }}",
              "projects": ["hcm-portal-v2"],
              "refs": [{
                "repository": "${{ github.repository }}",
                "commit": "${{ github.sha }}"
              }]
            }' || echo "⚠️ Sentry notification failed (optional)"

      - name: Create deployment record
        run: |
          echo "Deployment completed at $(date)" >> deployments.log
          echo "Commit: ${{ github.sha }}" >> deployments.log
          echo "Branch: ${{ github.ref }}" >> deployments.log

      - name: Notify team (optional - configure webhook)
        run: |
          # Example: Slack notification
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H "Content-Type: application/json" \
          #   -d '{"text": "✅ Backend deployed successfully to production"}'
          echo "✅ Deployment complete"

  # ============================================================================
  # JOB 6: Rollback on Failure
  # ============================================================================
  rollback-on-failure:
    name: Automated Rollback
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link to Supabase project
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Trigger rollback
        run: |
          echo "🔴 DEPLOYMENT FAILED - Triggering rollback"
          # Restore from latest backup via Supabase Dashboard
          # This is a manual step for now, but could be automated with Supabase API
          echo "⚠️ Manual action required: Restore database from backup in Supabase Dashboard"

      - name: Notify team of failure
        run: |
          echo "🚨 Deployment failed - manual rollback may be required"
          # Add your notification logic here (Slack, email, etc.)

# ============================================================================
# CONFIGURATION NOTES
# ============================================================================
# Required GitHub Secrets:
# - SUPABASE_ACCESS_TOKEN: Personal access token from Supabase Dashboard
# - SUPABASE_SERVICE_ROLE_KEY: Service role key for admin operations
# - SENTRY_AUTH_TOKEN: (Optional) Sentry API token for deployment tracking
# - SLACK_WEBHOOK_URL: (Optional) Slack webhook for notifications
#
# Setup Instructions:
# 1. Go to GitHub repo → Settings → Secrets and variables → Actions
# 2. Add each secret with the corresponding value from Supabase Dashboard
# 3. For SUPABASE_ACCESS_TOKEN: Dashboard → Account → Access Tokens → Generate
# 4. For SUPABASE_SERVICE_ROLE_KEY: Dashboard → Project Settings → API → service_role key
#
# To enable this workflow:
# 1. Commit this file to .github/workflows/backend-deploy.yml
# 2. Push to main branch
# 3. Workflow will run automatically on future pushes to supabase/ or src/integrations/supabase/
# ============================================================================
