    <!--
      PARTICLE BACKGROUND LAYER SYSTEM v3.1.0
      - Canvas z-index: 0 (derrière tout)
      - #root z-index: 1 (au-dessus du canvas)
      - Cards/Tables ont un fond opaque pour lisibilité
    -->
    <style>
      /* Layer 0: Canvas de particules (fond transparent) */
      #particle-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
      }

      /* Layer 1: Application React */
      #root {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
